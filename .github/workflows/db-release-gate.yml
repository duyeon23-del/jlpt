name: Supabase Release Gate

description: '릴리즈 전 DB 상태를 통합적으로 검증하는 워크플로우. 모든 주요 체크를 통과해야만 릴리즈 승인.'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/run-release-gate.mjs
      - scripts/check-no-tracked-secrets.mjs
      - scripts/require-admin-ops.mjs
      - scripts/verify_skill_map_after_load.sql
      - scripts/reset_dashboard.sql
      - scripts/report_recommendation.sql
      - package.json
      - .github/workflows/db-release-gate.yml

jobs:
  release-gate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_DB_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$SUPABASE_URL"

      - name: Install dependencies
        run: npm ci

      - name: Run unified release DB gate
        run: npm run db:gate:release
